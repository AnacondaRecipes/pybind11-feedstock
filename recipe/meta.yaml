{% set name = "pybind11" %}
{% set version = "3.0.4" %}
{% set abi_version = "11" %}
{% set abi_buildnumber = "0" %}

package:
  name: {{ name|lower }}-split
  version: {{ version }}

source:
  url: https://github.com/pybind/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 74b6a2c2b4573a400cafb6ecbf60c98df300cd3d0041296b913d02b2cbbb2676

build:
  number: 0
  
requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - ninja-base
  host:
    - pip
    - python
    - scikit-build-core >=0.11.2
    - tomlkit
  run:
    - python

outputs:
  - name: pybind11-abi
    version: {{ abi_version }}
    build:
      number: {{ abi_buildnumber }}
      noarch: generic
      run_exports:
        - pybind11-abi =={{ abi_version }}
    test:
      source_files:
        - include/pybind11/detail/internals.h
      requires:
        - python
      commands:
        - python -c "import re,sys; v=re.findall(r'PYBIND11_INTERNALS_VERSION\s+(\d+)', open('include/pybind11/detail/internals.h').read()); sys.exit(0 if '{{ abi_version }}' in v else 1)"

  - name: pybind11-global
    script: build-pybind11-global.sh  # [unix]
    script: build-pybind11-global.bat  # [win]
    requirements:
      build:
        - {{ stdlib('c') }}
        - {{ compiler('cxx') }}
        - cmake
        - ninja-base
      host:
        - pip
        - python
        - scikit-build-core >=0.11.2
        - tomlkit
      run:
        - python
      run_constrained:
        - pybind11-abi =={{ abi_version }}
    test:
      requires:
        - pip
      commands:
        - pip check

  - name: pybind11
    script: build-pybind11.sh  # [unix]
    script: build-pybind11.bat  # [win]
    requirements:
      build:
        - {{ stdlib('c') }}
        - {{ compiler('cxx') }}
        - cmake
        - ninja-base
      host:
        - pip
        - python
        - scikit-build-core >=0.11.2
        - tomlkit
      run:
        - python
        - {{ pin_subpackage("pybind11-global", exact=True) }}
      run_constrained:
        - pybind11-abi =={{ abi_version }}
    test:
      requires:
        - pip
      imports:
        - pybind11
      commands:
        - pip check
        - test -f ${PREFIX}/share/cmake/pybind11/pybind11Config.cmake                                 # [unix]
        - test -f ${PREFIX}/include/pybind11/pybind11.h                                               # [unix]
        - test -f $(python -c "import pybind11 as py; print(py.get_include())")/pybind11/pybind11.h   # [unix]
        - if not exist %LIBRARY_PREFIX%\share\cmake\pybind11\pybind11Config.cmake exit 1              # [win]
        - if not exist %LIBRARY_INC%\pybind11\pybind11.h exit 1                                       # [win]
        - if not exist %SP_DIR%\pybind11\include\pybind11\pybind11.h exit 1                           # [win]

about:
  home: https://github.com/pybind/pybind11
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Seamless operability between C++11 and Python
  description: |
    pybind11 is a lightweight header-only library that exposes C++ types
    in Python and vice versa, mainly to create Python bindings of existing
    C++ code. Its goals and syntax are similar to the excellent Boost.Python
    library by David Abrahams: to minimize boilerplate code in traditional
    extension modules by inferring type information using compile-time
    introspection.
  doc_url: https://pybind11.readthedocs.io
  dev_url: https://github.com/pybind/pybind11

extra:
  recipe-maintainers:
    - ax3l
    - SylvainCorlay
    - wjakob
    - henryiii
